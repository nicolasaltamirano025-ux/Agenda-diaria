.header-top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,44px);letter-spacing:5px;font-weight:400;}
h1 span{color:var(--accent);}
.date-label{text-transform:capitalize;color:var(--text-dim);font-size:13px;letter-spacing:.5px;margin-top:4px;}
.sync-status{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:6px;}
.sync-status.online{color:#7CB88A;}.sync-status.offline{color:var(--danger);}.sync-status.local{color:var(--accent);}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* BOTONES */
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.4);transition:all .15s ease;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface-hover);}
.btn:active{transform:translateY(1px);box-shadow:none;}
.btn.dim{color:var(--text-dim);}
.btn.icon-btn{padding:9px 12px;font-size:16px;letter-spacing:0;}

/* MOMENTUM */
.momentum-row{display:flex;align-items:center;gap:14px;margin-top:20px;}
.momentum-bar{flex:1;height:8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.momentum-fill{height:100%;width:0%;background:linear-gradient(90deg,#9A6422,var(--accent));box-shadow:0 0 14px var(--accent);border-radius:4px;transition:width .5s ease;}
.momentum-text{font-weight:600;font-size:13px;color:var(--accent);min-width:78px;text-align:right;letter-spacing:.5px;}

/* COLUMNAS */
.columns{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px;}
@media(max-width:700px){.columns{grid-template-columns:1fr;}}
.column-title-input{font-family:'Bebas Neue',sans-serif;letter-spacing:4px;font-size:12px;text-transform:uppercase;color:var(--text-dim);background:transparent;border:none;border-bottom:1px solid var(--border);width:100%;padding:0 0 8px;margin-bottom:12px;outline:none;transition:color .15s,border-color .15s;}
.column-title-input:hover{color:var(--text);}.column-title-input:focus{color:var(--accent);border-color:var(--accent);}
.col-add-row{display:flex;gap:6px;margin-bottom:10px;}
.col-add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none;min-width:0;transition:border-color .15s;}
.col-add-input::placeholder{color:#444;}.col-add-input:focus{border-color:var(--accent);}
.col-add-btn{background:var(--accent);color:#121214;border:none;border-radius:6px;padding:8px 12px;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;transition:filter .15s;}
.col-add-btn:hover{filter:brightness(1.1);}

/* TAREAS */
.task{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03);transition:transform .18s cubic-bezier(.2,0,0,1),background-color .15s,box-shadow .15s;}
@media(max-width:700px){
  .task{flex-wrap:wrap;align-items:flex-start;}
  .task-label{width:100%;order:1;padding-right:4px;}
  .drag-handle{order:0;}
  .checkbox{order:0;}
  .task-meta{order:2;flex-direction:row;gap:6px;margin-left:auto;}
  .task-delete{order:3;align-self:center;}
  .task-time-btn,.task-date-btn{width:auto;min-width:60px;}
}
.task:hover{background:var(--surface-hover);}
.task.done{background:#17171A;box-shadow:inset 0 2px 6px rgba(0,0,0,.55);}
.task.dragging{position:relative;z-index:30;transition:none;box-shadow:0 14px 32px rgba(0,0,0,.6);opacity:.96;background:var(--surface-hover);cursor:grabbing;}
body.dragging-active{user-select:none;-webkit-user-select:none;}
.drag-handle{color:var(--text-dim);display:flex;align-items:center;flex-shrink:0;cursor:grab;touch-action:none;padding:2px;}
.drag-handle:active{cursor:grabbing;}.task:hover .drag-handle{color:var(--text);}
.checkbox{width:18px;height:18px;border-radius:5px;border:2px solid var(--text-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task.done .checkbox{background:var(--accent);border-color:var(--accent);}
.checkbox svg{opacity:0;transition:opacity .15s;}.task.done .checkbox svg{opacity:1;}
.task-label{font-size:13px;font-weight:500;font-family:'Inter',sans-serif;flex:1;min-width:0;background:transparent;border:none;outline:none;padding:0;color:var(--text);cursor:text;transition:color .15s;}
.task-label:focus{color:var(--accent);}
.task.done .task-label{color:var(--text-dim);text-decoration:line-through;}
.task-meta{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.task-time-btn,.task-date-btn{width:72px;background:transparent;border:1px solid var(--border);border-radius:5px;padding:3px 5px;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:10px;text-align:left;cursor:pointer;transition:border-color .15s,color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-time-btn:hover,.task-date-btn:hover{border-color:var(--accent);color:var(--text);}
.task.done .task-meta{opacity:.5;}
.task-delete{margin-left:2px;background:none;border:none;color:var(--text-dim);font-size:18px;line-height:1;cursor:pointer;padding:2px 4px;border-radius:5px;transition:color .15s;flex-shrink:0;}
.task-delete:hover{color:var(--danger);}

/* EXTRAS */
.extra-section{margin-top:28px;}
.section-title{font-family:'Bebas Neue',sans-serif;letter-spacing:4px;font-size:12px;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.add-row{display:flex;gap:8px;margin-bottom:12px;}
#new-task-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
#new-task-input::placeholder{color:#444;}#new-task-input:focus{border-color:var(--accent);}
.add-btn{background:var(--accent);color:#121214;border:none;border-radius:8px;padding:10px 18px;font-family:'Inter',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:filter .15s;white-space:nowrap;}
.add-btn:hover{filter:brightness(1.1);}
.empty-extra{color:var(--text-dim);font-size:13px;padding:4px;}
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;}

/* ===== PICKER MODAL ===== */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;animation:fadeOverlay .15s ease;}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.picker-sheet{background:#1C1C1F;border:1px solid #2A2A2E;border-radius:20px 20px 0 0;width:100%;max-width:440px;padding:16px 20px 40px;animation:slideUp .22s cubic-bezier(.2,0,0,1);user-select:none;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.picker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.picker-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--accent);}
.picker-actions{display:flex;gap:8px;align-items:center;}
.picker-cancel,.picker-confirm{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;padding:6px 12px;border-radius:8px;transition:background .12s;}
.picker-cancel{color:var(--text-dim);}.picker-cancel:hover{background:#2A2A2E;}
.picker-confirm{color:#121214;background:var(--accent);}.picker-confirm:hover{filter:brightness(1.1);}
.picker-clear{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;border:none;background:none;cursor:pointer;padding:6px 10px;border-radius:8px;color:var(--danger);transition:background .12s;}
.picker-clear:hover{background:rgba(194,85,75,.12);}

/* CALENDARIO */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cal-nav button{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 10px;border-radius:8px;transition:background .12s;}
.cal-nav button:hover{background:#2A2A2E;color:var(--text);}
.cal-month-label{font-family:'Inter',sans-serif;font-weight:600;font-size:14px;color:var(--text);text-transform:capitalize;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cal-day-name{font-size:10px;color:var(--text-dim);padding:4px 0;font-family:'Inter',sans-serif;font-weight:500;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:background .12s;color:var(--text);}
.cal-day:hover{background:#2A2A2E;}.cal-day.empty{cursor:default;}
.cal-day.today{border:1px solid var(--accent);color:var(--accent);}
.cal-day.selected{background:var(--accent);color:#121214;font-weight:700;}
.cal-day.past{color:#444;}

/* CARRUSEL */
.time-carousel{display:flex;justify-content:center;align-items:center;margin:10px 0 4px;padding:0 8px;}
.carousel-col{position:relative;height:192px;width:88px;overflow:hidden;flex-shrink:0;}
.carousel-col::before,.carousel-col::after{content:'';position:absolute;left:0;right:0;height:72px;z-index:2;pointer-events:none;}
.carousel-col::before{top:0;background:linear-gradient(to bottom,#1C1C1F 30%,transparent);}
.carousel-col::after{bottom:0;background:linear-gradient(to top,#1C1C1F 30%,transparent);}
.carousel-selector{position:absolute;top:50%;left:8px;right:8px;height:48px;margin-top:-24px;border-top:1px solid rgba(224,162,60,.6);border-bottom:1px solid rgba(224,162,60,.6);border-radius:10px;background:rgba(224,162,60,.06);pointer-events:none;z-index:3;}
.carousel-track{display:flex;flex-direction:column;align-items:center;touch-action:none;cursor:grab;will-change:transform;}
.carousel-track:active{cursor:grabbing;}
.carousel-item{height:48px;width:88px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:18px;font-weight:500;color:#444;flex-shrink:0;user-select:none;}
.carousel-item.near{color:#888;font-size:22px;font-weight:500;}
.carousel-item.active{color:var(--text);font-size:28px;font-weight:700;}
.carousel-sep{font-size:30px;font-weight:700;color:var(--accent);padding:0 2px;flex-shrink:0;}
.ampm-col{display:flex;flex-direction:column;gap:8px;justify-content:center;margin-left:14px;}
.ampm-btn{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:10px 14px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text-dim);transition:all .15s;min-width:52px;text-align:center;}
.ampm-btn.active{background:var(--accent);color:#121214;border-color:var(--accent);}
.ampm-btn:hover:not(.active){border-color:var(--accent);color:var(--text);}

/* AGENDA MODAL */
.agenda-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:stretch;justify-content:flex-end;animation:fadeOverlay .2s ease;}
.agenda-panel{background:#17171A;border-left:1px solid var(--border);width:min(100vw,420px);display:flex;flex-direction:column;animation:slideRight .25s cubic-bezier(.2,0,0,1);}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.agenda-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.agenda-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--accent);}
.agenda-date{font-size:12px;color:var(--text-dim);margin-top:2px;text-transform:capitalize;}
.agenda-close{background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:color .12s;}
.agenda-close:hover{color:var(--text);}
.agenda-body{flex:1;overflow-y:auto;padding:16px 20px 40px;}
.agenda-empty{color:var(--text-dim);font-size:13px;padding:20px 0;text-align:center;line-height:1.6;}
.agenda-slot{display:flex;gap:14px;margin-bottom:20px;}
.agenda-time{font-size:12px;font-weight:600;color:var(--accent);min-width:60px;padding-top:2px;flex-shrink:0;}
.agenda-item{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
.agenda-item.done-item{opacity:.5;}
.agenda-item-label{font-size:13px;font-weight:600;color:var(--text);}
.agenda-item-label.done-item-label{text-decoration:line-through;color:var(--text-dim);}
.agenda-item-col{font-size:10px;color:var(--text-dim);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
.agenda-no-time{margin-top:24px;border-top:1px solid var(--border);padding-top:16px;}
.agenda-no-time-title{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.agenda-chip{display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;margin:0 6px 6px 0;font-size:12px;font-weight:500;color:var(--text-dim);}
.agenda-chip.done-chip{opacity:.4;text-decoration:line-through;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header-top">
    <h1>DISCIPLINA<span>.</span></h1>
    <div class="header-actions">
      <button class="btn dim" id="reset-datetime-btn">Limpiar horas</button>
      <button class="btn dim" id="reset-main-btn">Reiniciar cols</button>
      <button class="btn" id="reset-btn">Reiniciar día</button>
      <button class="btn icon-btn" id="agenda-btn" title="Ver agenda del día">📅</button>
    </div>
  </div>
  <div class="date-label" id="date-label"></div>
  <div class="sync-status" id="sync-status">● conectando...</div>
  <div class="momentum-row">
    <div class="momentum-bar"><div class="momentum-fill" id="momentum-fill"></div></div>
    <div class="momentum-text" id="momentum-text">0/0 · 0%</div>
  </div>
  <div class="loading" id="loading">Cargando tu agenda...</div>
  <div class="columns" id="columns" style="display:none;"></div>
  <div class="extra-section" id="extra-section" style="display:none;">
    <div class="section-title">PENDIENTES EXTRA</div>
    <div class="add-row">
      <input type="text" id="new-task-input" placeholder="Escribe un nuevo pendiente..." />
      <button class="add-btn" id="add-task-btn">Añadir</button>
    </div>
    <div id="custom-tasks-list" class="task-list" data-list="extra"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'agenda-diaria-state';
  const firebaseConfig = {
    apiKey: "AIzaSyCAQ6Xo_S9fd3lWT02eVeBXNG5baNy2Nwc",
    authDomain: "agenda-78832.firebaseapp.com",
    databaseURL: "https://agenda-78832-default-rtdb.firebaseio.com",
    projectId: "agenda-78832",
    storageBucket: "agenda-78832.firebasestorage.app",
    messagingSenderId: "1024392270069",
    appId: "1:1024392270069:web:f84a85cf57f5d3174175bc"
  };

  let stateRef = null;
  let state = null;
  let dragState = null;
  let activePicker = null;

  function todayStr() {
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function formatDate() {
    return new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
  }

  function getDefaultState() {
    return {
      columns:[
        {title:'CUERPO',tasks:[
          {id:'agua_fria',label:'Agua fría',done:false,time:'',date:'',deletable:false},
          {id:'gimnasio',label:'Gimnasio',done:false,time:'',date:'',deletable:false},
          {id:'sentimientos',label:'Sentimientos',done:false,time:'',date:'',deletable:false}
        ]},
        {title:'MENTE',tasks:[
          {id:'duolingo',label:'Duolingo',done:false,time:'',date:'',deletable:false},
          {id:'ajedrez',label:'Ajedrez',done:false,time:'',date:'',deletable:false},
          {id:'leer',label:'Leer',done:false,time:'',date:'',deletable:false},
          {id:'metas',label:'Metas',done:false,time:'',date:'',deletable:false},
          {id:'resumenes',label:'Resúmenes de libros',done:false,time:'',date:'',deletable:false},
          {id:'meditar',label:'Meditar',done:false,time:'',date:'',deletable:false}
        ]},
        {title:'HABILIDADES',tasks:[
          {id:'curso_ia',label:'Curso de IA',done:false,time:'',date:'',deletable:false},
          {id:'curso_br',label:'Curso bienes raíces',done:false,time:'',date:'',deletable:false},
          {id:'piano',label:'Piano',done:false,time:'',date:'',deletable:false},
          {id:'keg',label:'Keg',done:false,time:'',date:'',deletable:false}
        ]}
      ],
      extra:[],
      lastReset:todayStr(),
      lastModified:0
    };
  }

  function getAllTasks() {
    return state.columns.flatMap(c=>c.tasks).concat(state.extra);
  }

  function ensureShape() {
    let changed=false;
    if(!Array.isArray(state.columns)) {
      const d=getDefaultState();
      state.columns=d.columns.map(col=>{
        return {title:col.title,tasks:col.tasks.map(t=>{
          return {id:t.id,label:t.label,done:!!(state.tasks&&state.tasks[t.id]),time:'',date:'',deletable:false};
        })};
      });
      delete state.tasks; changed=true;
    }
    if(!Array.isArray(state.extra)) {
      state.extra=(state.customTasks||[]).map(t=>{
        return {id:t.id,label:t.label,done:!!t.done,time:t.time||'',date:t.date||'',deletable:true};
      });
      delete state.customTasks; changed=true;
    }
    getAllTasks().forEach(t=>{
      if(t.time===undefined){t.time='';changed=true;}
      if(t.date===undefined){t.date='';changed=true;}
      if(t.deletable===undefined){t.deletable=true;changed=true;}
    });
    return changed;
  }

  function applyDailyReset() {
    if(state.lastReset!==todayStr()) {
      getAllTasks().forEach(t=>t.done=false);
      state.lastReset=todayStr(); return true;
    }
    return false;
  }

  function setSyncStatus(mode) {
    const el=document.getElementById('sync-status');
    el.className='sync-status '+mode;
    if(mode==='online') el.textContent='● sincronizado';
    else if(mode==='offline') el.textContent='● sin conexión (guardado local)';
    else el.textContent='● solo local';
  }

  async function loadState() {
    try { const raw=localStorage.getItem(STORAGE_KEY); if(raw) state=JSON.parse(raw); } catch(e) {}
    if(!state||(!state.columns&&!state.tasks)) state=getDefaultState();
    ensureShape(); applyDailyReset();
    document.getElementById('loading').style.display='none';
    document.getElementById('columns').style.display='grid';
    document.getElementById('extra-section').style.display='block';
    render();
    if(firebaseConfig.apiKey.indexOf('PEGA')===0) { setSyncStatus('local'); return; }
    try {
      firebase.initializeApp(firebaseConfig);
      stateRef=firebase.database().ref('agenda-diaria');
      stateRef.on('value',snapshot=>{
        const remote=snapshot.val(); let needsSave=false;
        if(remote&&(remote.lastModified||0)>=(state.lastModified||0)) { state=remote; }
        else { needsSave=true; }
        if(!state.columns&&!state.tasks) { state=getDefaultState(); needsSave=true; }
        if(ensureShape()) needsSave=true;
        if(applyDailyReset()) needsSave=true;
        try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
        render(); setSyncStatus('online');
        if(needsSave) saveState();
      },err=>{ console.error(err); setSyncStatus('offline'); });
    } catch(e) { console.error(e); setSyncStatus('offline'); }
  }

  function saveState() {
    state.lastModified=Date.now();
    try { localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); } catch(e) {}
    if(stateRef) stateRef.set(state).catch(()=>setSyncStatus('offline'));
  }

  // ===== ACCIONES =====
  function resetAll() { getAllTasks().forEach(t=>t.done=false); state.lastReset=todayStr(); saveState(); render(); }
  function resetMainColumns() { state.columns.forEach(col=>col.tasks.forEach(t=>t.done=false)); saveState(); render(); }
  function resetDatetime() {
    state.columns.forEach(col=>col.tasks.forEach(t=>{t.time='';t.date='';}));
    saveState(); render();
  }
  function toggleTask(colIndex,id) {
    const t=state.columns[colIndex].tasks.find(t=>t.id===id); if(t) t.done=!t.done; saveState(); render();
  }
  function toggleExtra(id) {
    const t=state.extra.find(t=>t.id===id); if(t) t.done=!t.done; saveState(); render();
  }
  function addToColumn(colIndex,label) {
    const id='col_'+colIndex+'_'+Date.now();
    state.columns[colIndex].tasks.push({id,label,done:false,time:'',date:'',deletable:true});
    saveState(); render();
  }
  function addExtra() {
    const input=document.getElementById('new-task-input');
    const label=input.value.trim(); if(!label) return;
    state.extra.push({id:'extra_'+Date.now(),label,done:false,time:'',date:'',deletable:true});
    input.value=''; saveState(); render();
  }
  function deleteTask(colIndex,id) {
    state.columns[colIndex].tasks=state.columns[colIndex].tasks.filter(t=>t.id!==id);
    saveState(); render();
  }
  function deleteExtra(id) {
    state.extra=state.extra.filter(t=>t.id!==id); saveState(); render();
  }

  function parseTaskDate(task) {
    if(!task.date||!task.time) return null;
    const dp=task.date.match(/(\d{1,2})[\/-](\d{1,2})(?:[\/-](\d{2,4}))?/);
    if(!dp) return null;
    let day=parseInt(dp[1]),month=parseInt(dp[2])-1,year=dp[3]?parseInt(dp[3]):new Date().getFullYear();
    if(year<100) year+=2000;
    const ts=task.time.toLowerCase().replace(/\s/g,'');
    const m=ts.match(/^(\d{1,2})(?::(\d{2}))?(am|pm)?$/);
    if(!m) return null;
    let h=parseInt(m[1]),mn=m[2]?parseInt(m[2]):0;
    const ap=m[3]?m[3]:(h>=12?'pm':'am');
    if(ap==='pm'&&h<12) h+=12; if(ap==='am'&&h===12) h=0;
    return new Date(year,month,day,h,mn);
  }

  function autoSortColumn(changedTask) {
    let list=null;
    for(const col of state.columns) { if(col.tasks.find(t=>t.id===changedTask.id)){list=col.tasks;break;} }
    if(!list&&state.extra.find(t=>t.id===changedTask.id)) list=state.extra;
    if(!list) return;
    const withDate=list.filter(t=>parseTaskDate(t)!==null).sort((a,b)=>parseTaskDate(a)-parseTaskDate(b));
    const withoutDate=list.filter(t=>parseTaskDate(t)===null);
    const sorted=[...withDate,...withoutDate];
    sorted.forEach((t,i)=>{list[i]=t;});
    saveState(); render();
  }

  // ===== DRAG & DROP =====
  const TASK_GAP=8;
  document.addEventListener('pointerdown',e=>{
    const handle=e.target.closest('.drag-handle'); if(!handle) return;
    const taskEl=handle.closest('.task'); const listEl=taskEl.parentElement;
    const items=[...listEl.children].filter(c=>c.classList.contains('task'));
    const currentIndex=items.indexOf(taskEl);
    const rects=items.map(it=>it.getBoundingClientRect());
    const itemHeight=rects[currentIndex].height+TASK_GAP;
    dragState={taskEl,listEl,items,rects,currentIndex,targetIndex:currentIndex,startY:e.clientY,startCenter:rects[currentIndex].top+rects[currentIndex].height/2,itemHeight};
    taskEl.classList.add('dragging'); document.body.classList.add('dragging-active');
    try{handle.setPointerCapture(e.pointerId);}catch(err){}
    e.preventDefault();
  });
  document.addEventListener('pointermove',e=>{
    if(!dragState) return;
    const {taskEl,items,currentIndex,startY,startCenter,itemHeight,rects}=dragState;
    const deltaY=e.clientY-startY;
    taskEl.style.transform='translateY('+deltaY+'px) scale(1.02)';
    const draggedCenter=startCenter+deltaY;
    let countAbove=0,countBelow=0;
    items.forEach((item,i)=>{
      if(i===currentIndex) return;
      const originalCenter=rects[i].top+rects[i].height/2;
      let shift=0;
      if(i<currentIndex&&draggedCenter<originalCenter){shift=itemHeight;countAbove++;}
      else if(i>currentIndex&&draggedCenter>originalCenter){shift=-itemHeight;countBelow++;}
      item.style.transform=shift?'translateY('+shift+'px)':'';
    });
    dragState.targetIndex=currentIndex-countAbove+countBelow;
  });
  function endDrag() {
    if(!dragState) return;
    const {taskEl,listEl,items,currentIndex,targetIndex}=dragState;
    taskEl.classList.remove('dragging'); taskEl.style.transform='';
    items.forEach(item=>{item.style.transform='';});
    document.body.classList.remove('dragging-active'); dragState=null;
    if(targetIndex!==currentIndex) {
      const ids=items.map(it=>it.dataset.id);
      const moved=ids.splice(currentIndex,1)[0]; ids.splice(targetIndex,0,moved);
      reorderList(listEl.dataset.list,ids);
    }
  }
  document.addEventListener('pointerup',endDrag);
  document.addEventListener('pointercancel',endDrag);

  function reorderList(listKey,idsInOrder) {
    let tasks;
    if(listKey==='extra') { tasks=state.extra; }
    else { tasks=state.columns[parseInt(listKey.split('-')[1],10)].tasks; }
    const map={};tasks.forEach(t=>map[t.id]=t);
    const reordered=idsInOrder.map(id=>map[id]).filter(Boolean);
    if(reordered.length===tasks.length) {
      if(listKey==='extra') state.extra=reordered;
      else state.columns[parseInt(listKey.split('-')[1],10)].tasks=reordered;
      saveState();
    }
    render();
  }

  function openTimePicker(task,onSave) {
    closePicker();
    let selHour=8,selMin=0,selAmPm='AM';
    if(task.time) {
      const t=task.time.toLowerCase().replace(/\s/g,'');
      const m=t.match(/^(\d{1,2})(?::(\d{2}))?(am|pm)?$/);
      if(m) {
        let h=parseInt(m[1]);const mn=m[2]?parseInt(m[2]):0;
        const ap=m[3]?m[3].toUpperCase():(h>=12?'PM':'AM');
        if(h===0){h=12;selAmPm='AM';}else if(h===12){selAmPm='PM';}
        else if(h>12){h-=12;selAmPm='PM';}else{selAmPm=ap;}
        selHour=h;selMin=mn;
      }
    }
    const hours=Array.from({length:12},(_,i)=>i+1);
    const mins=Array.from({length:12},(_,i)=>i*5);
    const overlay=document.createElement('div');overlay.className='picker-overlay';
    overlay.addEventListener('click',e=>{if(e.target===overlay)closePicker();});
    const sheet=document.createElement('div');sheet.className='picker-sheet';
    const header=document.createElement('div');header.className='picker-header';
    const titleEl=document.createElement('div');titleEl.className='picker-title';titleEl.textContent='HORA';
    const acts=document.createElement('div');acts.className='picker-actions';
    const clearBtn=document.createElement('button');clearBtn.className='picker-clear';clearBtn.textContent='Borrar';
    clearBtn.addEventListener('click',()=>{onSave('');closePicker();});
    const cancelBtn=document.createElement('button');cancelBtn.className='picker-cancel';cancelBtn.textContent='Cancelar';
    cancelBtn.addEventListener('click',closePicker);
    const confirmBtn=document.createElement('button');confirmBtn.className='picker-confirm';confirmBtn.textContent='Listo';
    confirmBtn.addEventListener('click',()=>{
      onSave(selHour+':'+String(selMin).padStart(2,'0')+' '+selAmPm);closePicker();
    });
    acts.appendChild(clearBtn);acts.appendChild(cancelBtn);acts.appendChild(confirmBtn);
    header.appendChild(titleEl);header.appendChild(acts);sheet.appendChild(header);

    const ITEM_H=48;
    const COL_H=192; // debe coincidir con height del .carousel-col en CSS

    function makeCarousel(items,initVal,onChange) {
      let currentIdx=Math.max(0,items.indexOf(initVal));
      const col=document.createElement('div');col.className='carousel-col';
      const sel=document.createElement('div');sel.className='carousel-selector';col.appendChild(sel);
      const track=document.createElement('div');track.className='carousel-track';
      const PAD=2;

      for(let i=0;i<PAD;i++){const ph=document.createElement('div');ph.className='carousel-item';track.appendChild(ph);}
      items.forEach(val=>{
        const el=document.createElement('div');el.className='carousel-item';
        el.textContent=String(val).padStart(2,'0');track.appendChild(el);
      });
      for(let i=0;i<PAD;i++){const ph=document.createElement('div');ph.className='carousel-item';track.appendChild(ph);}

      // El offset para centrar el ítem idx en el selector:
      // El selector está en COL_H/2 - ITEM_H/2 desde el top del col.
      // El ítem idx (incluyendo PAD) empieza en (idx+PAD)*ITEM_H desde el top del track.
      // Para centrarlo: translateY = COL_H/2 - ITEM_H/2 - (idx+PAD)*ITEM_H
      const CENTER = COL_H/2 - ITEM_H/2;
      function idxToOffset(idx){ return CENTER - (idx + PAD) * ITEM_H; }

      let offsetY=0,velY=0,lastY=null,lastT=null,rafId=null;

      function updateItems(rawOffsetY) {
        // ¿qué índice de item real está centrado ahora?
        const rawRealIdx = (CENTER - rawOffsetY) / ITEM_H - PAD;
        const els=track.querySelectorAll('.carousel-item');
        els.forEach((el,i)=>{
          const realIdx=i-PAD;
          const dist=Math.abs(realIdx-rawRealIdx);
          el.classList.remove('active','near');
          if(dist<0.6) el.classList.add('active');
          else if(dist<1.6) el.classList.add('near');
        });
      }

      function applyOffset(y,animate) {
        track.style.transition=animate?'transform .28s cubic-bezier(.25,.46,.45,.94)':'none';
        track.style.transform='translateY('+y+'px)';
        updateItems(y);
      }

      function snapTo(idx) {
        idx=Math.max(0,Math.min(items.length-1,idx));
        currentIdx=idx; offsetY=idxToOffset(idx);
        applyOffset(offsetY,true); onChange(items[currentIdx]);
      }

      function snapNearest() {
        const rawRealIdx = (CENTER - offsetY) / ITEM_H - PAD;
        snapTo(Math.round(rawRealIdx));
      }

      // inicializar en posición correcta
      offsetY=idxToOffset(currentIdx); applyOffset(offsetY,false);

      function momentumLoop() {
        offsetY+=velY; velY*=0.88; applyOffset(offsetY,false);
        if(Math.abs(velY)>0.5){ rafId=requestAnimationFrame(momentumLoop); }
        else{ cancelAnimationFrame(rafId); snapNearest(); }
      }

      track.addEventListener('pointerdown',e=>{
        cancelAnimationFrame(rafId); track.style.transition='none';
        lastY=e.clientY; lastT=Date.now(); velY=0;
        track.setPointerCapture(e.pointerId); e.preventDefault();
      });
      track.addEventListener('pointermove',e=>{
        if(lastY===null) return;
        const dy=e.clientY-lastY; const dt=Date.now()-lastT;
        velY=dt>0?dy/dt*16:0;
        offsetY+=dy; lastY=e.clientY; lastT=Date.now(); applyOffset(offsetY,false);
      });
      track.addEventListener('pointerup',()=>{
        if(lastY===null) return; lastY=null;
        if(Math.abs(velY)>2){ rafId=requestAnimationFrame(momentumLoop); }
        else{ snapNearest(); }
      });

      col.appendChild(track); return col;
    }

    const timeRow=document.createElement('div');timeRow.className='time-carousel';
    const hourCol=makeCarousel(hours,selHour,v=>{selHour=v;});
    const sep=document.createElement('div');sep.className='carousel-sep';sep.textContent=':';
    const minCol=makeCarousel(mins,selMin,v=>{selMin=v;});
    const ampmCol=document.createElement('div');ampmCol.className='ampm-col';
    ['AM','PM'].forEach(ap=>{
      const btn=document.createElement('button');btn.className='ampm-btn'+(selAmPm===ap?' active':'');
      btn.textContent=ap;
      btn.addEventListener('click',()=>{selAmPm=ap;ampmCol.querySelectorAll('.ampm-btn').forEach(b=>b.classList.toggle('active',b.textContent===ap));});
      ampmCol.appendChild(btn);
    });
    timeRow.appendChild(hourCol);timeRow.appendChild(sep);timeRow.appendChild(minCol);timeRow.appendChild(ampmCol);
    sheet.appendChild(timeRow);overlay.appendChild(sheet);document.body.appendChild(overlay);activePicker=overlay;
  }

  // ===== AGENDA MODAL =====
  function openAgenda() {
    const overlay=document.createElement('div');overlay.className='agenda-overlay';
    overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
    const panel=document.createElement('div');panel.className='agenda-panel';
    const hdr=document.createElement('div');hdr.className='agenda-header';
    const titleWrap=document.createElement('div');
    const titleEl=document.createElement('div');titleEl.className='agenda-title';titleEl.textContent='HOY';
    const dateEl=document.createElement('div');dateEl.className='agenda-date';dateEl.textContent=formatDate();
    titleWrap.appendChild(titleEl);titleWrap.appendChild(dateEl);
    const closeBtn=document.createElement('button');closeBtn.className='agenda-close';closeBtn.innerHTML='&times;';
    closeBtn.addEventListener('click',()=>overlay.remove());
    hdr.appendChild(titleWrap);hdr.appendChild(closeBtn);panel.appendChild(hdr);
    const body=document.createElement('div');body.className='agenda-body';

    const todayD=new Date();
    const todayStr2=String(todayD.getDate()).padStart(2,'0')+'/'+String(todayD.getMonth()+1).padStart(2,'0')+'/'+todayD.getFullYear();

    // Función para encontrar y togglear la tarea real en state
    function toggleFromAgenda(id) {
      let found=false;
      state.columns.forEach(col=>{
        const t=col.tasks.find(t=>t.id===id);
        if(t){t.done=!t.done;found=true;}
      });
      if(!found){
        const t=state.extra.find(t=>t.id===id);
        if(t) t.done=!t.done;
      }
      saveState();
      render(); // actualiza la vista principal
      buildAgendaBody(); // re-renderiza el panel
    }

    // Recoge tareas relevantes para hoy desde state (no copia, usa ids)
    function getAgendaTasks() {
      const allTasks=[];
      state.columns.forEach((col)=>col.tasks.forEach(t=>{allTasks.push({...t,colName:col.title});}));
      state.extra.forEach(t=>allTasks.push({...t,colName:'EXTRAS'}));
      const timed=[];const untimed=[];
      allTasks.forEach(t=>{
        const matchesDate=!t.date||t.date===todayStr2||
          t.date.startsWith(String(todayD.getDate()).padStart(2,'0')+'/'+String(todayD.getMonth()+1).padStart(2,'0'));
        if(!matchesDate) return;
        if(t.time) timed.push(t); else untimed.push(t);
      });
      timed.sort((a,b)=>{
        const pa=parseTaskDate(a)||new Date(0,0,0,parseRawTime(a.time).h,parseRawTime(a.time).m);
        const pb=parseTaskDate(b)||new Date(0,0,0,parseRawTime(b.time).h,parseRawTime(b.time).m);
        return pa-pb;
      });
      return {timed,untimed};
    }

    function buildAgendaBody() {
      body.innerHTML='';
      const {timed,untimed}=getAgendaTasks();

      if(timed.length===0&&untimed.length===0) {
        const empty=document.createElement('div');empty.className='agenda-empty';
        empty.innerHTML='No hay pendientes para hoy.<br>Asigna una hora o fecha a tus tareas para verlas aquí.';
        body.appendChild(empty);
        return;
      }

      timed.forEach(t=>{
        const slot=document.createElement('div');slot.className='agenda-slot';

        const timeEl=document.createElement('div');timeEl.className='agenda-time';timeEl.textContent=t.time;

        const item=document.createElement('div');
        item.className='agenda-item'+(t.done?' done-item':'');
        item.style.cursor='pointer';
        item.title='Toca para marcar/desmarcar';

        // Checkbox visual
        const checkRow=document.createElement('div');
        checkRow.style.cssText='display:flex;align-items:center;gap:10px;';
        const checkEl=document.createElement('div');
        checkEl.style.cssText='width:16px;height:16px;border-radius:4px;border:2px solid '+(t.done?'var(--accent)':'var(--text-dim)')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+(t.done?'var(--accent)':'transparent')+';transition:all .15s;';
        if(t.done) checkEl.innerHTML='<svg width="9" height="9" viewBox="0 0 12 12"><path d="M1 6L4.5 9.5L11 2" stroke="#121214" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        const lbl=document.createElement('div');
        lbl.className='agenda-item-label'+(t.done?' done-item-label':'');
        lbl.textContent=t.label;
        checkRow.appendChild(checkEl);checkRow.appendChild(lbl);

        const colLbl=document.createElement('div');colLbl.className='agenda-item-col';colLbl.textContent=t.colName;
        colLbl.style.marginLeft='26px';

        item.appendChild(checkRow);item.appendChild(colLbl);
        item.addEventListener('click',()=>toggleFromAgenda(t.id));

        slot.appendChild(timeEl);slot.appendChild(item);body.appendChild(slot);
      });

      if(untimed.length>0) {
        const section=document.createElement('div');section.className='agenda-no-time';
        const sTitle=document.createElement('div');sTitle.className='agenda-no-time-title';sTitle.textContent='Sin hora asignada';
        section.appendChild(sTitle);
        untimed.forEach(t=>{
          const chip=document.createElement('div');
          chip.className='agenda-chip'+(t.done?' done-chip':'');
          chip.style.cursor='pointer';
          chip.title='Toca para marcar/desmarcar';

          const checkEl=document.createElement('span');
          checkEl.style.cssText='display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;border:1.5px solid '+(t.done?'var(--accent)':'#555')+';margin-right:7px;background:'+(t.done?'var(--accent)':'transparent')+';flex-shrink:0;';
          if(t.done) checkEl.innerHTML='<svg width="8" height="8" viewBox="0 0 12 12"><path d="M1 6L4.5 9.5L11 2" stroke="#121214" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

          chip.appendChild(checkEl);
          chip.appendChild(document.createTextNode(t.label));
          chip.addEventListener('click',()=>toggleFromAgenda(t.id));
          section.appendChild(chip);
        });
        body.appendChild(section);
      }
    }

    buildAgendaBody();
    panel.appendChild(body);overlay.appendChild(panel);document.body.appendChild(overlay);
  }

  function parseRawTime(str) {
    const t=str.toLowerCase().replace(/\s/g,'');
    const m=t.match(/^(\d{1,2})(?::(\d{2}))?(am|pm)?$/);
    if(!m) return{h:0,m:0};
    let h=parseInt(m[1]),mn=m[2]?parseInt(m[2]):0;
    const ap=m[3]?m[3]:(h>=12?'pm':'am');
    if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;
    return{h,m:mn};
  }

  // ===== RENDER TASK =====
  function renderTask(task,onToggle,onDelete,listKey) {

    const dateBtn=document.createElement('button');dateBtn.className='task-date-btn';

    if(task.deletable) {
      const del=document.createElement('button');del.className='task-delete';del.innerHTML='&times;';
      del.addEventListener('click',e=>{e.stopPropagation();onDelete();});
      item.appendChild(del);
    }
    item.addEventListener('click',e=>{
      if(e.target.closest('.drag-handle')||e.target.closest('.task-meta')||e.target.closest('.task-delete')||e.target.closest('.task-label')) return;
      onToggle();
    });
    return item;
  }

  // ===== RENDER =====
  function render() {
    document.getElementById('date-label').textContent=formatDate();
    const all=getAllTasks();
    const total=all.length,done=all.filter(t=>t.done).length;
    const pct=total===0?0:Math.round(done/total*100);
    document.getElementById('momentum-fill').style.width=pct+'%';
    document.getElementById('momentum-text').textContent=done+'/'+total+' · '+pct+'%';

    const columnsEl=document.getElementById('columns');columnsEl.innerHTML='';
    state.columns.forEach((col,colIndex)=>{
      const colDiv=document.createElement('div');colDiv.className='column';
      const titleInput=document.createElement('input');titleInput.className='column-title-input';
      titleInput.type='text';titleInput.value=col.title;
      titleInput.addEventListener('change',()=>{state.columns[colIndex].title=titleInput.value.trim()||col.title;saveState();});
      colDiv.appendChild(titleInput);
      const listDiv=document.createElement('div');listDiv.className='task-list';listDiv.dataset.list='col-'+colIndex;
      col.tasks.forEach(task=>{
        listDiv.appendChild(renderTask(task,()=>toggleTask(colIndex,task.id),()=>deleteTask(colIndex,task.id),'col-'+colIndex));
      });
      colDiv.appendChild(listDiv);
      // Añadir pendiente a columna
      const addRow=document.createElement('div');addRow.className='col-add-row';
      const addInput=document.createElement('input');addInput.type='text';addInput.className='col-add-input';addInput.placeholder='+ Añadir...';
      const addBtn=document.createElement('button');addBtn.className='col-add-btn';addBtn.textContent='OK';
      const doAdd=()=>{const v=addInput.value.trim();if(!v)return;addToColumn(colIndex,v);addInput.value='';};
      addBtn.addEventListener('click',doAdd);
      addInput.addEventListener('keypress',e=>{if(e.key==='Enter')doAdd();});
      addRow.appendChild(addInput);addRow.appendChild(addBtn);colDiv.appendChild(addRow);
      columnsEl.appendChild(colDiv);
    });

    const extraList=document.getElementById('custom-tasks-list');extraList.innerHTML='';
    if(state.extra.length===0) {
      const empty=document.createElement('div');empty.className='empty-extra';empty.textContent='Agrega tu primer pendiente arriba.';extraList.appendChild(empty);
    } else {
      state.extra.forEach(task=>{
        extraList.appendChild(renderTask(task,()=>toggleExtra(task.id),()=>deleteExtra(task.id),'extra'));
      });
    }
  }

  // ===== LISTENERS =====
  document.getElementById('reset-btn').addEventListener('click',resetAll);
  document.getElementById('reset-main-btn').addEventListener('click',resetMainColumns);
  document.getElementById('reset-datetime-btn').addEventListener('click',resetDatetime);
  document.getElementById('agenda-btn').addEventListener('click',openAgenda);
  document.getElementById('add-task-btn').addEventListener('click',addExtra);
  document.getElementById('new-task-input').addEventListener('keypress',e=>{if(e.key==='Enter')addExtra();});
  loadState();
  if('serviceWorker' in navigator) {
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(e=>console.error(e)));
  }
</script>
</body>
</html>
